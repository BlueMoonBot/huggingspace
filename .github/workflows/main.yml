name: Infinite Keep-Alive for Lichess Bots

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    # Aggressive enough to bypass HF sleep and absorb any random server resets.
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual click-to-run testing in GitHub UI

permissions:
  contents: write
  actions: write

jobs:
  prevent-sleep:
    runs-on: ubuntu-latest
    name: Keep-Alive Engine
     
    steps:
      - name: Checkout Repository Architecture
        uses: actions/checkout@v4
        with:
          token: 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

      - name: Keep-Alive Execution Loop
        run: |
          # =========================================================
          # CONFIGURATION: ADD YOUR HUGGING FACE LINKS HERE
          # =========================================================
          URLS=(
            "https://bluemoonbot-bluemoonbot-lichess.hf.space"
            "https://bluemoonbot-hectobot1.hf.space"
            "https://bluemoonbot-fluffybot.hf.space"
            "https://bluemoonbot-bot.hf.space"
          )
          # =========================================================

          echo "🚀 Starting advanced Keep-Alive routine for Lichess Bot Spaces..."
           
          for url in "${URLS[@]}"; do
            echo "------------------------------------------------------"
            echo "🌐 Targeting Space: $url"
            echo "------------------------------------------------------"
             
            # Docker containers on free Spaces often need a warm-up phase 
            # if Hugging Face cycles the underlying node. We hit the Space 
            # 3 times spaced 15 seconds apart to ensure it stays fully awake.
            for attempt in {1..3}; do
              echo "⏳ [Attempt $attempt/3] Sending ping to wake or sustain container..."
               
              # Execute curl with a 15-second timeout, grabbing the HTTP status code
              status_code=$(curl -s -L -o /dev/null --connect-timeout 15 --max-time 20 -w "%{http_code}" "$url")
               
              echo "📊 Server responded with HTTP Status: $status_code"
               
              if [ "$status_code" -eq 200 ]; then
                echo "✅ Space is active and healthy!"
              elif [ "$status_code" -eq 503 ] || [ "$status_code" -eq 502 ]; then
                echo "⚠️ Space is currently booting up its Docker container. Standby..."
              elif [ "$status_code" -eq 000 ]; then
                echo "❌ Connection timed out. The server might be heavily throttled or rebuilding."
              else
                echo "ℹ️ Space returned non-standard status, but traffic was successfully registered."
              fi
               
              # Wait 15 seconds before hitting it again to guarantee continuous traffic stream
              if [ $attempt -lt 3 ]; then
                sleep 15
              fi
            done
          done
           
          echo "======================================================"
          echo "🎉 All Lichess bot endpoints successfully sustained!"
          echo "======================================================"

          # =========================================================================
          # SELF-SUSTAINMENT MODULE (Resets GitHub's 60-Day Inactivity Clock)
          # =========================================================================
          echo ""
          echo "🔄 Initiating GitHub Self-Sustainment Cycle..."
           
          # Configure the local git instance to use GitHub's official bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
           
          # Write a small timestamp update to a local tracking file
          echo "Lichess Bots Keep-Alive Pulse: $(date -u)" > bot_pulse.txt
           
          # Safely stage, commit, and push back to GitHub without loop triggers
          git add bot_pulse.txt
          if git commit -m "chore(keepalive): sustainment pulse [skip ci]" --allow-empty; then
            git push
            echo "🌌 Pulse pushed successfully. GitHub inactivity timer has been reset!"
          else
            echo "⚠️ Commit skipped or failed. Check configurations."
          fi
